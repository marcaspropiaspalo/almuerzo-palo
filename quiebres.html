<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiebres del dia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .card { background: white; border-radius: 12px; padding: 24px; max-width: 560px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { color: #2D6A4F; font-size: 22px; margin-bottom: 4px; }
    .subtitulo { color: #666; font-size: 14px; margin-bottom: 24px; }
    .seccion { margin-bottom: 24px; }
    .seccion h2 { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #D8F3DC; }
    .categoria h3 { font-size: 12px; text-transform: uppercase; color: #2D6A4F; letter-spacing: 1px; margin: 12px 0 8px; }
    .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .check-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #B5451B; cursor: pointer; flex-shrink: 0; }
    .check-item label { font-size: 14px; cursor: pointer; }
    .btn { width: 100%; padding: 14px; background: #2D6A4F; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #1B4332; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
<div class="card">
  <h1>Quiebres del dia</h1>
  <p class="subtitulo" id="subtitulo">Cargando...</p>
  <div class="seccion">
    <h2>Platos</h2>
    <div id="platos"><div class="loading">Cargando...</div></div>
  </div>
  <div class="seccion">
    <h2>Acompañamientos</h2>
    <div id="acomps"><div class="loading">Cargando...</div></div>
  </div>
  <button class="btn" id="btnEnviar" onclick="enviarQuiebres()" disabled>Confirmar quiebres</button>
</div>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPu_1wYNIeztCk1ySIiiD52lzvYc6g9vjeORWfwd1W38ZAwZOYWdu3JxXnHpmxpwVr/exec';
  const PROXY = 'https://corsproxy.io/?';

  function cargarDatos() {
    fetch(PROXY + encodeURIComponent(SCRIPT_URL + '?action=getDatosLocal'))
      .then(r => r.json())
      .then(datos => {
        document.getElementById('subtitulo').innerHTML = '<strong>' + (datos.local || '') + '</strong> — Tilda los platos y acompañamientos que no tenes disponibles hoy';
        renderPlatos(datos.categorias);
        renderAcomps(datos.acomps);
        document.getElementById('btnEnviar').disabled = false;
      })
      .catch(() => {
        document.getElementById('subtitulo').textContent = 'Error cargando. Recarga la pagina.';
      });
  }

  function renderPlatos(categorias) {
    const container = document.getElementById('platos');
    container.innerHTML = '';
    for (const cat of categorias) {
      const div = document.createElement('div');
      div.className = 'categoria';
      div.innerHTML = '<h3>' + cat.nombre + '</h3>';
      for (const plato of cat.platos) {
        const id = 'p_' + btoa(unescape(encodeURIComponent(plato)));
        div.innerHTML += '<div class="check-item"><input type="checkbox" id="' + id + '" value="' + plato + '"><label for="' + id + '">' + plato + '</label></div>';
      }
      container.appendChild(div);
    }
  }

  function renderAcomps(acomps) {
    const container = document.getElementById('acomps');
    container.innerHTML = '';
    if (!acomps || acomps.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:14px;">No hay acompañamientos para el dia de hoy.</p>';
      return;
    }
    for (const acomp of acomps) {
      const id = 'a_' + btoa(unescape(encodeURIComponent(acomp)));
      container.innerHTML += '<div class="check-item"><input type="checkbox" id="' + id + '" value="' + acomp + '"><label for="' + id + '">' + acomp + '</label></div>';
    }
  }

  async function enviarQuiebres() {
    const quiebres = [];
    document.querySelectorAll('#platos input:checked').forEach(cb => {
      quiebres.push({ tipo: 'Plato', nombre: cb.value });
    });
    document.querySelectorAll('#acomps input:checked').forEach(cb => {
      quiebres.push({ tipo: 'Acompaniamiento', nombre: cb.value });
    });

    const btn = document.getElementById('btnEnviar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const data = encodeURIComponent(JSON.stringify(quiebres));
      const res = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + '?action=procesarQuiebres&data=' + data));
      const result = await res.json();
      if (result.ok) {
        document.querySelector('.card').innerHTML = '<div style="text-align:center;padding:40px 0"><div style="font-size:48px">✅</div><h2 style="color:#2D6A4F;margin-top:16px">Quiebres registrados!</h2><p style="color:#666;margin-top:8px">El equipo ya puede ver el menu actualizado.</p></div>';
      } else {
        alert('Error al enviar. Intenta de nuevo.');
        btn.disabled = false;
        btn.textContent = 'Confirmar quiebres';
      }
    } catch(err) {
      alert('Error al enviar. Intenta de nuevo.');
      btn.disabled = false;
      btn.textContent = 'Confirmar quiebres';
    }
  }

  cargarDatos();
</script>
</body>
</html>
